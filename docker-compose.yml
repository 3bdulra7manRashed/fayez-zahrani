version: "3.8"

services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        volumes:
            - sqlite_data:/var/www/html/database/data
            - uploads_data:/var/www/html/public/uploads
            - settings_data:/var/www/html/storage/app/settings
        extra_hosts:
            - "host.docker.internal:host-gateway"

volumes:
    sqlite_data:
    uploads_data:
    settings_data:
